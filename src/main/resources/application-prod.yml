spring:
  datasource:
    url: ${MYSQL_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
jwt:
  secret:
    key: ${JWT_SECRET_KEY}


cloud:
  aws:
    region:
      static: ap-northeast-2
    credentials:
      instance-profile: true
    sqs:
      queue:
        emailAlert: couponmoa-queue