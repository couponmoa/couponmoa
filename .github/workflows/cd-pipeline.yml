name: CD Pipeline
on:
  workflow_run:
    workflows: [ "CI Pipeline" ]
    types:
      - completed
jobs:
  deploy:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push'

    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create application-prop.yml file
        run: |
          mkdir -p src/main/resources
          echo "${{ secrets.APPLICATION_PROD_YML }}" > src/main/resources/application-prod.yml 

      - name: Grant permission to gradlew
        run: chmod +x ./gradlew

      - name: Build Spring Boot JAR
        run: ./gradlew build -x test

      - name: Show built JARs
        run: ls -al build/libs

      - name: Prepare deploy directory
        run: |
          mkdir -p deploy/script
          cp $(find build/libs -name "*.jar" | head -n 1) deploy/app.jar
          cp Dockerfile deploy/
          cp appspec.yml deploy/
          cp script/deploy.sh deploy/script/deploy.sh
          cp src/main/resources/application-prod.yml deploy/

      - name: Build Docker image
        run: docker build -t couponmoa-prod .
        working-directory: deploy

      - name: Create deployment zip
        run: |
          cd deploy && zip -r $GITHUB_SHA.zip .

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v3
        with:
          aws-region: ${{ secrets.AWS_REGION }}
          aws-access-key-id: ${{ secrets.IAM_ACCESSUSER_ACCESSKEY }}
          aws-secret-access-key: ${{ secrets.IAM_ACCESSUSER_SECRET_ACCESS_KEY }}

      - name: Upload to S3
        run: aws s3 cp deploy/$GITHUB_SHA.zip s3://${{ secrets.AWS_S3_BUCKET }}/$GITHUB_SHA.zip

      - name: CodeDeploy to EC2
        run: |
          aws deploy create-deployment \
            --application-name ${{ secrets.AWS_CODE_DEPLOY_APPLICATION }} \
            --deployment-group-name ${{ secrets.AWS_CODE_DEPLOY_GROUP }} \
            --deployment-config-name CodeDeployDefault.AllAtOnce \
            --s3-location bucket=${{ secrets.AWS_S3_BUCKET }},key=$GITHUB_SHA.zip,bundleType=zip \
            --file-exists-behavior OVERWRITE