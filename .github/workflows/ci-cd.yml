name: CI/CD Pipeline

on:
  push:
    branches: [ "dev" ]
  pull_request:
    branches: [ "dev" ]

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create application-local.properties file
        run: |
          mkdir -p src/main/resources
          echo "${{ secrets.LOCAL_PROPERTIES }}" > src/main/resources/application-local.properties

      - name: Create .env file
        run: |
          echo "${{ secrets.DB_PASSWORD }}" > .env

      - name: Create application-local.yml file
        run: |
          mkdir -p src/main/resources
          echo "${{ secrets.LOCAL_PROPERTIES_YML }}" > src/main/resources/application-local.yml

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Spring Boot App
        run: |
          chmod +x ./gradlew
          ./gradlew clean build -x test

      - name: Set up Docker Buildx (optional but safe)
        uses: docker/setup-buildx-action@v3

      - name: Install docker-compose
        run: |
          DOCKER_COMPOSE_VERSION=2.20.2
          sudo curl -L "https://github.com/docker/compose/releases/download/v${DOCKER_COMPOSE_VERSION}/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
          sudo chmod +x /usr/local/bin/docker-compose

      - name: Docker Compose Up
        run: |
          docker-compose up -d --build
          docker ps
          docker logs spring-app || true