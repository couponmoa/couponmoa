name: CI Pipeline

on:
  push:
    branches: [ "dev" ]
  pull_request:
    branches: [ "dev" ]

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

#      - name: Create application-prop.properties file
#        run: |
#          mkdir -p src/main/resources
#          echo "${{ secrets.LOCAL_PROPERTIES }}" > src/main/resources/application-prod.properties

#      - name: Create .env file
#        run: |
#          echo "MYSQL_ROOT_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env
#          echo "MYSQL_DATABASE=${{ secrets.DB_NAME }}" >> .env
#          echo "SQS_EMAIL_ALERT_QUEUE_URL=${{ secrets.SQS_EMAIL_ALERT_QUEUE_URL }}" >> .env

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Check if test yml exists
        run: |
          echo "==== application-test.yml 내용 ===="
          cat src/test/resources/application-test.yml || echo "❌ application-test.yml 없음"

      - name: Run tests
        run: |
          chmod +x ./gradlew
          SPRING_PROFILES_ACTIVE=test ./gradlew clean test

      - name: Build Spring Boot App (without test)
        run: |
          chmod +x ./gradlew
          ./gradlew build -x test